
<article class="card">
  {% if include.post.cover %}
    <img class="cover" src="{{ include.post.cover | relative_url }}" alt="">
  {% else %}
    <div class="cover"></div>
  {% endif %}
  <div class="card-body">
    <h2><a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a></h2>
    <p>{{ include.post.excerpt | strip_html | truncate: 180 }}</p>
  </div>
</article>
