<header class='sticky top-0 z-50 bg-background dark:bg-background-dark backdrop-blur shadow-sm'>
  <div class='max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16'>
    <a href='{{ site.baseurl }}/'
       class='text-lg font-semibold text-text-primary dark:text-text-primary-dark hover:text-text-secondary dark:hover:text-text-secondary-dark focus:outline-none focus:ring-2 focus:ring-indigo-500'>
      Daniel Passos
    </a>
    <nav
      class='hidden md:flex flex-1 justify-center space-x-6 text-sm font-medium text-text-primary dark:text-text-primary-dark'
      aria-label='Main navigation'><a href='{{ site.baseurl }}/' class='hover:text-text-secondary dark:hover:text-text-secondary-dark'>Home</a>
      <a href='{{ site.baseurl }}/categories' class='hover:text-text-secondary dark:hover:text-text-secondary-dark'>Categories</a>
      <a href='{{ site.baseurl }}/tags' class='hover:text-text-secondary dark:hover:text-text-secondary-dark'>Tags</a>
      <a href='{{ site.baseurl }}/about/' class='hover:text-text-secondary dark:hover:text-text-secondary-dark'>About</a>
      <a href='{{ site.baseurl }}/feed.xml' class='hover:text-text-secondary dark:hover:text-text-secondary-dark' title='RSS feed'
         aria-label='RSS Feed'>RSS</a></nav>
    <div class='flex items-center space-x-4'>
      <button id='theme-toggle'
              class='w-10 h-10 flex items-center justify-center rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500'
              aria-label='Toggle dark mode'>
        <svg class='block dark:hidden w-5 h-5 text-yellow-500' fill='currentColor' viewBox='0 0 20 20'>
          <path d='M10 15a5 5 0 110-10 5 5 0 010 10z'></path>
        </svg>
        <svg class='hidden dark:block w-5 h-5 text-gray-200' fill='currentColor' viewBox='0 0 20 20'>
          <path fill-rule='evenodd' d='M17.293 13.95A8 8 0 016.05 2.707 8 8 0 1017.293 13.95z'
                clip-rule='evenodd'></path>
        </svg>
      </button>
      <button id='mobile-menu-button' class='md:hidden focus:outline-none' aria-label='Toggle menu'>
        <svg class='w-6 h-6 text-gray-500' fill='none' stroke='currentColor' viewBox='0 0 24 24'>
          <path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M4 6h16M4 12h16M4 18h16'></path>
        </svg>
      </button>
    </div>
  </div>
  <nav id='mobile-menu'
       class='md:hidden hidden px-4 pb-4 space-y-2 text-sm font-medium text-text-primary dark:text-text-primary-dark'
       aria-label='Mobile navigation'><a href='/'
                                         class='block hover:text-text-secondary dark:hover:text-text-secondary-dark'>Home</a>
    <a href='/categories' class='block hover:text-text-secondary dark:hover:text-text-secondary-dark'>Categories</a>
    <a href='/tags' class='block hover:text-text-secondary dark:hover:text-text-secondary-dark'>Tags</a>
    <a href='/about/' class='block hover:text-text-secondary dark:hover:text-text-secondary-dark'>About</a>
    <a href='/index.xml' class='block hover:text-text-secondary dark:hover:text-text-secondary-dark' title='RSS feed'
       aria-label='RSS Feed'>RSS</a></nav>
</header>
